{{ partial "process-frontmatter-assets.html" . }}
<!doctype html>
<html lang="{{ .Lang | default "en" }}">
  <head>
    <meta charset="utf-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1" />

    <link rel="icon" href="/favicon.png" />
    <title>{{ .Title }}</title>

    {{ partial "styles.html" . }}
    {{ partial "js.html" . }}

  </head>
  <body>
    {{ partial "mainnav.html" . }}
    <div class="af-glitter" aria-hidden="true"></div>
    <div class="af-stickers" aria-hidden="true">
      <img class="af-sticker af-sticker-br" src="/images/konijnen.gif" alt="">
    </div>


    <!-- Code that all your templates share, like a header -->
    {{ block "main" . }}
      <!-- The part of the page that begins to differ between templates -->
    {{ end }}

    {{ block "footer" . }}
      {{ partial "footer.html" }}
    {{ end }}
  </body>
</html>
